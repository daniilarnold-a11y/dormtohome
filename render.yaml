# Deploy to Render.com — https://render.com
# Connect your GitHub repo and Render auto-reads this file

services:
  - type: web
    name: dormtohome
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true      # Render generates a secure random value
      - key: DB_PATH
        value: /data/dormtohome.db
    disk:
      name: dormtohome-data
      mountPath: /data
      sizeGB: 1
